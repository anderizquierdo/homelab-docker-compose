services:
  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    container_name: seerr
    environment:
      - TZ=Europe/Madrid
    volumes:
      - ./config:/app/config
    restart: unless-stopped
    expose:
      - 5055
    networks:
      - arr-suite

networks:
  arr-suite:
    external: true
